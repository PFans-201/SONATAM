# =============================================================================
#  SONATAM — centralised configuration
# =============================================================================
#
#  All paths are relative to the SONATAM project root unless they start with /.
#  Edit this file once; all modules read it via sonata.config.settings.load().
# =============================================================================

# ── Data sources ────────────────────────────────────────────────────────────
data:
  # Raw download destination (managed by scripts/download_lmd.py)
  raw_dir:           "data/raw"

  # Unpacked locations (set automatically by the download script)
  midi_root:         "data/raw/lmd_matched"        # lmd_matched.tar.gz
  aligned_root:      "data/raw/lmd_aligned"        # lmd_aligned.tar.gz
  h5_root:           "data/raw/lmd_matched_h5"     # lmd_matched_h5.tar.gz
  match_scores_path: "data/raw/match_scores.json"  # matched match_scores
  aligned_scores_path: "data/raw/match_scores_aligned.json"  # aligned match_scores

  # Download URLs  (Colin Raffel / Lakh MIDI Dataset)
  urls:
    lmd_matched:       "http://hog.ee.columbia.edu/craffel/lmd/lmd_matched.tar.gz"
    lmd_aligned:       "http://hog.ee.columbia.edu/craffel/lmd/lmd_aligned.tar.gz"
    lmd_matched_h5:    "http://hog.ee.columbia.edu/craffel/lmd/lmd_matched_h5.tar.gz"
    match_scores:      "http://hog.ee.columbia.edu/craffel/lmd/match_scores.json"
    match_scores_aligned: "https://colinraffel.com/projects/lmd/match_scores.json"

# ── Dataset curation ────────────────────────────────────────────────────────
dataset:
  min_match_score:   0.70        # DTW quality filter threshold
  pick_midi:         "best"      # "best" | "first" | "all"
  max_tracks:        null        # null = use all; set an int for prototyping
  output_dir:        "data/processed"
  parquet_file:      "data/processed/curated_dataset.parquet"
  csv_file:          "data/processed/curated_dataset.csv"

# ── Harmonic analyzer ───────────────────────────────────────────────────────
analyzer:
  key_window:        6
  key_confidence:    0.80

# ── Knowledge graph ──────────────────────────────────────────────────────────
knowledge_graph:
  output_dir:        "data/processed"
  turtle_file:       "data/processed/harmonic_kg.ttl"
  ntriples_file:     "data/processed/harmonic_kg.nt"
  graphml_file:      "data/processed/harmonic_kg.graphml"
  include_progressions: false    # true = adds chord-level nodes (large graph)

# ── Deep learning — Graph Neural Network ─────────────────────────────────
graph_learning:
  task:              "link_prediction"    # "link_prediction" | "node_classification"

  # GraphSAGE architecture
  graphsage:
    hidden_channels:   128
    num_layers:        2
    aggregator:        "mean"             # "mean" | "max" | "lstm"
    dropout:           0.3
    num_neighbors:     [15, 10]           # per-layer sampling fan-out

  # Link prediction decoder
  link_predictor:
    hidden_channels:   64
    num_layers:        2                  # MLP on concatenated embeddings

  # Training
  training:
    epochs:            100
    lr:                1.0e-3
    weight_decay:      1.0e-4
    batch_size:        512
    val_frac:          0.15
    test_frac:         0.15
    negative_sampling_ratio: 1.0         # neg / pos edges
    clip_grad_norm:    1.0
    patience:          15                 # early stopping patience
    save_every:        10
    device:            "auto"
    seed:              42

  checkpoint_dir:      "checkpoints"

# ── Feature extraction ───────────────────────────────────────────────────
features:
  # jSymbolic2 (statistical branch)
  jsymbolic:
    jar_path:          "lib/jSymbolic2.jar"    # path to JAR file
    config_path:       null                     # null = use defaults (all features)
    timeout_sec:       120                      # per-file timeout

  # musif (semantic branch)
  musif:
    extract_roman:     true
    extract_key:       true
    extract_harmony:   true

# ── Inference pipeline ───────────────────────────────────────────────────
inference:
  # MT3 audio transcription
  mt3:
    model_name:        "mt3"                   # Google MT3 checkpoint
    sample_rate:       16000
    output_format:     "midi"

  output_dir:          "data/inferred"
